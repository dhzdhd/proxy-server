# WireGuard client config — generated by OpenTofu
# Copy this file to:
#   Linux/macOS : /etc/wireguard/wg0.conf
#   Windows     : C:\Program Files\WireGuard\wg0.conf  (import via WireGuard app)

[Interface]
# Your PC's tunnel addresses
Address    = ${wg_client_ipv4}, ${wg_client_ipv6}
PrivateKey = ${wg_client_private_key}
DNS        = 1.1.1.1, 2606:4700:4700::1111   # Cloudflare (IPv4 + IPv6)

[Peer]
# The Mumbai EC2 server
PublicKey  = ${wg_server_public_key}
Endpoint   = ${server_ipv4}:${wireguard_port}    # connect over IPv4 EIP
# Endpoint = [${server_ipv6}]:${wireguard_port}  # alternative: connect over IPv6

# Route ALL traffic through the VPN (full tunnel — required for VDI proxy use)
AllowedIPs = 0.0.0.0/0, ::/0

# Keep NAT alive (important for connections behind home routers)
PersistentKeepalive = 25
